<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laiken Logistics — FY 2026 Job Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111419;
    --surface2: #181c24;
    --border: #1e242f;
    --accent: #00e5a0;
    --accent2: #f7b731;
    --accent3: #e84393;
    --open: #f7b731;
    --delivered: #00e5a0;
    --text: #e8eaf0;
    --muted: #5a6070;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,229,160,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,12,16,0.9);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px; height: 42px;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--accent);
    font-weight: 700;
    position: relative;
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(0,229,160,0); }
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    font-weight: 700;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  main {
    position: relative;
    z-index: 1;
    padding: 36px 40px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* KPI Row */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .kpi-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .kpi-card:nth-child(2)::after { background: var(--accent2); }
  .kpi-card:nth-child(3)::after { background: var(--accent3); }
  .kpi-card:nth-child(4)::after { background: #4ea8ff; }
  .kpi-card:nth-child(5)::after { background: #a78bfa; }

  .kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-card:nth-child(1) .kpi-value { color: var(--accent); }
  .kpi-card:nth-child(2) .kpi-value { color: var(--accent2); }
  .kpi-card:nth-child(3) .kpi-value { color: var(--accent3); }
  .kpi-card:nth-child(4) .kpi-value { color: #4ea8ff; }
  .kpi-card:nth-child(5) .kpi-value { color: #a78bfa; }

  .kpi-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 36px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    animation: fadeUp 0.7s ease both;
  }

  .chart-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--accent);
    display: inline-block;
  }

  /* Donut chart */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .donut-svg { flex-shrink: 0; }

  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-val {
    font-weight: 700;
    font-size: 13px;
  }

  /* Bar chart */
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bar-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    height: 22px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), rgba(0,229,160,0.5));
    transition: width 1s ease;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
  }

  .bar-num {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--bg);
    white-space: nowrap;
  }

  /* Origin chart */
  .origin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .origin-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .origin-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
  }

  .origin-count {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .filter-btn.active-open { background: var(--open); color: var(--bg); border-color: var(--open); }
  .filter-btn.active-delivered { background: var(--delivered); color: var(--bg); border-color: var(--delivered); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }

  .table-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 14px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead th {
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  thead th:hover { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  tbody tr:hover { background: rgba(0,229,160,0.04); }

  td {
    padding: 13px 16px;
    vertical-align: top;
    color: var(--text);
  }

  .td-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    font-weight: 700;
  }

  .td-client {
    font-size: 12px;
    font-weight: 600;
    max-width: 160px;
  }

  .td-desc {
    font-size: 11px;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.5;
  }

  .td-inv {
    font-family: var(--mono);
    font-size: 10px;
    color: #4ea8ff;
  }

  .td-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-delivered {
    background: rgba(0,229,160,0.1);
    color: var(--delivered);
    border: 1px solid rgba(0,229,160,0.3);
  }

  .badge-open {
    background: rgba(247,183,49,0.1);
    color: var(--open);
    border: 1px solid rgba(247,183,49,0.3);
  }

  .badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .no-results {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .table-footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .charts-row { grid-template-columns: 1fr 1fr; }
    main { padding: 24px 20px; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-icon">LL</div>
    <div>
      <div class="logo-text">Laiken Logistics</div>
      <div class="logo-sub">FY 2026 Job Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div id="clock">—</div>
  </div>
</header>

<main>

  <!-- KPI Row -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Job Status Overview</div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="120" height="120" viewBox="0 0 120 120" id="donut-svg"></svg>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Jobs by Client</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Origins</div>
      <div class="origin-grid" id="origin-grid"></div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">All Jobs — FY 2026</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div class="filter-bar" style="margin:0">
          <span class="filter-label">Filter:</span>
          <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">All</button>
          <button class="filter-btn" id="btn-open" onclick="setFilter('open')">Open</button>
          <button class="filter-btn" id="btn-delivered" onclick="setFilter('delivered')">Delivered</button>
        </div>
        <input class="search-box" type="text" placeholder="Search jobs, clients..." oninput="setSearch(this.value)" />
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('code')">Job Code ↕</th>
            <th onclick="sortTable('date')">Date ↕</th>
            <th>Client</th>
            <th>Description</th>
            <th onclick="sortTable('status')">Status ↕</th>
            <th>Invoice</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="table-footer">
      <span id="row-count">— jobs</span>
      <span>LAIKEN LOGISTICS © FY2026</span>
    </div>
  </div>
</main>

<script>
const RAW = [
  { date: "09/02/2026", code: "BES260001", client: "Bernoulli Engineering Services", desc: "Customs Clearing | HAWB: F625407 | FEDEX | 1 Pkg, 104Kgs | Grundfos Pumps | Origin: South Africa", status: "Delivered", inv: "INV-001385", origin: "South Africa" },
  { date: "21/02/2026", code: "BES260002", client: "Bernoulli Engineering Services", desc: "Customs Clearing | NBOFL3618600 | ONE EXPRESS | 1 Pkg, 104Kgs | Irrigation System | Origin: China", status: "Open", inv: "INV-001399", origin: "China" },
  { date: "21/02/2026", code: "BES260003", client: "Bernoulli Engineering Services", desc: "Customs Clearing | MARITIME LCL | ONE EXPRESS | 1 Pkg, 6Kgs | Solar Lights and Panels | Origin: China", status: "Open", inv: "INV-001400", origin: "China" },
  { date: "10/02/2026", code: "COTECH260001", client: "COTECH Solar Solutions Ltd", desc: "Transportation + Customs Clearing | FCL 1×40' TGBU5727301 | 24 Pallets, 24Tns | Solar Panels | Mombasa–Kampala | Origin: China", status: "Delivered", inv: "INV-001377 / INV-001378", origin: "China" },
  { date: "—", code: "ECLIPSE260001", client: "NARO Secretariat / NACORRI", desc: "Customs Clearing | HAWB: F625407 | FEDEX | 1 Pkg, 104Kgs | Composite PRC Machine | Origin: Germany", status: "Delivered", inv: "INV-001382", origin: "Germany" },
  { date: "—", code: "ECLIPSE260002", client: "Uganda National Bureau of Standards", desc: "Customs Clearing | AWB: 071-5936 6580 | Qatar Airways | 1 Pkg, 104Kgs | Centrifuge Machine | Origin: Germany", status: "Delivered", inv: "INV-001383", origin: "Germany" },
  { date: "—", code: "ECLIPSE260003", client: "Uganda National Bureau of Standards", desc: "Customs Clearing | 8866 8059 2944 | FEDEX | 1 Pkg, 104Kgs | Lab Vortex | Origin: China", status: "Delivered", inv: "INV-001384", origin: "China" },
  { date: "—", code: "ECLIPSE260004", client: "Palin Corporation U Ltd", desc: "Customs Clearing | 8872 6190 4115 | FEDEX | 1 Pkg, 6.5Kgs | Reagent | Origin: Netherlands", status: "Delivered", inv: "INV-001388", origin: "Netherlands" },
  { date: "—", code: "ECLIPSE260005", client: "NARO", desc: "Customs Clearing | SCS2600002 | CS Freight Consult | 5 Pkg, 974.5Kgs | Medical Equipment | Origin: Singapore", status: "Delivered", inv: "INV-001390", origin: "Singapore" },
  { date: "—", code: "ECLIPSE260006", client: "NARO", desc: "Customs Clearing | 011-45725343 | J.M.D.CARGO PVT LTD | 20 Pkg, 102.2Kgs | Prepared Culture Media & Lab Chemical | Origin: India", status: "Delivered", inv: "INV-001392", origin: "India" },
  { date: "19/02/2026", code: "ECLIPSE260007", client: "Palin Corporation U Ltd", desc: "Customs Clearing | TKL/MBA/09742 | ARIHANT INDUSTRIES | 21 Pkg, 2275Kgs | Lab Bottles & Lab Equipment | Origin: India", status: "Open", inv: "INV-001397", origin: "India" },
  { date: "19/02/2026", code: "ECLIPSE260008", client: "Palin Corporation U Ltd", desc: "Customs Clearing | 8887-2029-9583 | J.M.D.CARGO | 20 Pkg, 102.2Kgs | Prepared Culture Media | Origin: Netherlands", status: "Open", inv: "INV-001396", origin: "Netherlands" },
  { date: "19/02/2026", code: "ECLIPSE260009", client: "Palin Corporation U Ltd", desc: "Customs Clearing | 8886-0814-2213 | J.M.D.CARGO | 20 Pkg, 17Kgs | Lab Chemical | Origin: Germany", status: "Open", inv: "INV-001398", origin: "Germany" },
  { date: "02/03/2026", code: "ECLIPSE260010", client: "Palin Corporation U Ltd", desc: "Customs Clearing | AWB: 8889-8294-2565 | Lovibond | 2 Pkg, 24Kgs | Water Safety Kit | Origin: Denmark", status: "Open", inv: "INV-001404", origin: "Denmark" },
  { date: "—", code: "NARO260001", client: "NARO Secretariat / NALLIRI", desc: "Transportation + Customs Clearing | FCL 1×40' TGBU5727301 | 24 Pallets, 24Tns | Solar Panels | Mombasa–Kampala | Origin: China", status: "Delivered", inv: "INV-001386", origin: "China" },
  { date: "—", code: "NARO260002", client: "NARO Secretariat / NALLIRI", desc: "Customs Clearing | AWB: 020-20041803 | LCL | 2 Pallets, 15Kgs | Cassava Plants | Origin: USA", status: "Open", inv: "INV-001387", origin: "USA" },
  { date: "—", code: "NARO260003", client: "NARO Secretariat / Namulonge", desc: "Customs Clearing | AWB: 020-20041803 | LCL | 2 Pallets, 15Kgs | Cassava Plants | Origin: USA", status: "Delivered", inv: "INV-001393", origin: "USA" },
  { date: "19/02/2026", code: "NARO260004", client: "NARO Secretariat / Namulonge", desc: "Customs Clearing | AWB: 071-59945222 | LCL | 2 Pallets, 555.7Kgs | Centrifuge | Origin: China", status: "Delivered", inv: "INV-001395", origin: "China" },
  { date: "19/02/2026", code: "NARO260005", client: "NARO Secretariat / Namulonge", desc: "Customs Clearing | AWB: 071-59945222 | LCL | 2 Pallets, 555.7Kgs | Reagents | Origin: France", status: "Open", inv: "INV-001401", origin: "France" },
  { date: "24/02/2026", code: "NARO260006", client: "NARO Secretariat / NALLIRI", desc: "NDA Clearing | LCL | 2 Pallets, 555.7Kgs | Reagents", status: "Open", inv: "INV-001402", origin: "—" },
  { date: "02/03/2026", code: "NARO260007", client: "NARO Secretariat / NALLIRI", desc: "3rd Party Pickup Charges | LCL | 2 Pallets | Reagents", status: "Open", inv: "INV-001403", origin: "—" },
];

let filter = 'all';
let search = '';
let sortKey = 'code';
let sortAsc = true;

function setFilter(f) {
  filter = f;
  ['all','open','delivered'].forEach(x => {
    const btn = document.getElementById('btn-' + x);
    btn.className = 'filter-btn' + (x === f ? ' active' : '');
  });
  render();
}

function setSearch(v) { search = v.toLowerCase(); render(); }

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  render();
}

function getFiltered() {
  return RAW.filter(r => {
    const matchFilter = filter === 'all' || r.status.toLowerCase() === filter;
    const matchSearch = !search ||
      r.code.toLowerCase().includes(search) ||
      r.client.toLowerCase().includes(search) ||
      r.desc.toLowerCase().includes(search) ||
      r.inv.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  }).sort((a, b) => {
    let av = a[sortKey === 'code' ? 'code' : sortKey === 'date' ? 'date' : 'status'];
    let bv = b[sortKey === 'code' ? 'code' : sortKey === 'date' ? 'date' : 'status'];
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
}

function render() {
  const data = getFiltered();
  const tbody = document.getElementById('table-body');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="no-results">NO JOBS FOUND</div></td></tr>`;
  } else {
    tbody.innerHTML = data.map((r, i) => `
      <tr style="animation-delay:${i * 0.03}s">
        <td class="td-code">${r.code}</td>
        <td class="td-date">${r.date}</td>
        <td class="td-client">${r.client}</td>
        <td class="td-desc">${r.desc}</td>
        <td><span class="badge badge-${r.status.toLowerCase()}">${r.status}</span></td>
        <td class="td-inv">${r.inv}</td>
      </tr>
    `).join('');
  }
  document.getElementById('row-count').textContent = `${data.length} of ${RAW.length} jobs`;
}

function buildKPIs() {
  const total = RAW.length;
  const delivered = RAW.filter(r => r.status === 'Delivered').length;
  const open = RAW.filter(r => r.status === 'Open').length;
  const clients = new Set(RAW.map(r => r.client)).size;
  const origins = new Set(RAW.map(r => r.origin).filter(o => o !== '—')).size;

  const kpis = [
    { label: 'Total Jobs', value: total, sub: 'FY 2026' },
    { label: 'Open Jobs', value: open, sub: `${Math.round(open/total*100)}% of total` },
    { label: 'Delivered', value: delivered, sub: `${Math.round(delivered/total*100)}% completion` },
    { label: 'Clients', value: clients, sub: 'Active accounts' },
    { label: 'Origins', value: origins, sub: 'Countries' },
  ];

  document.getElementById('kpi-row').innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function buildDonut() {
  const delivered = RAW.filter(r => r.status === 'Delivered').length;
  const open = RAW.length - delivered;
  const total = RAW.length;
  const r = 45, cx = 60, cy = 60;
  const circumference = 2 * Math.PI * r;
  const dPct = delivered / total;
  const oPct = open / total;
  const gap = 2;

  function arc(pct, offset, color) {
    const dash = pct * circumference - gap;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="18"
      stroke-dasharray="${dash} ${circumference - dash}"
      stroke-dashoffset="${-offset * circumference}"
      transform="rotate(-90 ${cx} ${cy})" />`;
  }

  const svg = document.getElementById('donut-svg');
  svg.innerHTML = `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e242f" stroke-width="18"/>
    ${arc(dPct, 0, '#00e5a0')}
    ${arc(oPct, dPct, '#f7b731')}
    <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="#e8eaf0" font-family="Space Mono" font-size="14" font-weight="700">${total}</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" fill="#5a6070" font-family="Space Mono" font-size="8">JOBS</text>
  `;

  document.getElementById('donut-legend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div><div><div class="legend-val">${delivered}</div><div style="color:var(--muted);font-size:9px">DELIVERED</div></div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f7b731"></div><div><div class="legend-val">${open}</div><div style="color:var(--muted);font-size:9px">OPEN</div></div></div>
  `;
}

function buildBarChart() {
  const counts = {};
  RAW.forEach(r => {
    const short = r.client.split('/')[0].trim().replace('Secretariat', 'Sec.').substring(0, 22);
    counts[short] = (counts[short] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const max = sorted[0][1];

  document.getElementById('bar-chart').innerHTML = sorted.map(([name, count]) => `
    <div class="bar-row">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(count/max*100)}%">
          <span class="bar-num">${count}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function buildOrigins() {
  const counts = {};
  RAW.forEach(r => { if (r.origin !== '—') counts[r.origin] = (counts[r.origin] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  document.getElementById('origin-grid').innerHTML = sorted.map(([name, count]) => `
    <div class="origin-item">
      <span class="origin-name">${name}</span>
      <span class="origin-count">${count}</span>
    </div>
  `).join('');
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

buildKPIs();
buildDonut();
buildBarChart();
buildOrigins();
render();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
